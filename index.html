<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelado y Simulación | Neural Study Deck</title>
    <!-- Fuentes: Inter para legibilidad, Fira Code para datos técnicos -->
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@300;400;600;800&display=swap"
        rel="stylesheet">

    <style>
        /* =========================================
           VARIABLES CYBERPUNK Y RESET
        ========================================= */
        :root {
            --bg-dark: #070B14;
            --panel-glass: rgba(15, 23, 42, 0.6);
            --cyan-neon: #06b6d4;
            --magenta-neon: #d946ef;
            --green-neon: #10b981;
            --red-neon: #ef4444;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border-glow: rgba(6, 182, 212, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Canvas Background */
        #neuralCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* =========================================
           HEADER Y POMODORO (DASHBOARD)
        ========================================= */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--panel-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glow);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .logo-area h1 {
            font-family: 'Fira Code', monospace;
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--cyan-neon);
            letter-spacing: -1px;
        }

        .logo-area span {
            color: var(--magenta-neon);
        }

        .pomodoro-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid var(--border-glow);
        }

        .ring-container {
            position: relative;
            width: 40px;
            height: 40px;
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .time-display {
            font-family: 'Fira Code', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--cyan-neon);
        }

        .btn-pomo {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.2s, color 0.2s;
        }

        .btn-pomo:hover {
            color: var(--cyan-neon);
            transform: scale(1.1);
        }

        /* =========================================
           NAVEGACIÓN DE MÓDULOS
        ========================================= */
        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 2rem 0;
            z-index: 10;
        }

        .nav-btn {
            background: var(--panel-glass);
            border: 1px solid var(--border-glow);
            color: var(--text-muted);
            padding: 0.75rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-btn.active {
            color: #fff;
            border-color: var(--cyan-neon);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        .nav-btn.active::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--cyan-neon);
            box-shadow: 0 0 10px var(--cyan-neon);
        }

        .nav-btn:hover:not(.active) {
            background: rgba(6, 182, 212, 0.1);
            color: #fff;
        }

        /* =========================================
           CONTENEDOR PRINCIPAL Y ANIMACIONES
        ========================================= */
        main {
            flex-grow: 1;
            padding: 0 2rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            perspective: 1000px;
        }

        .module {
            display: none;
            animation: fadeInUp 0.5s ease-out forwards;
        }

        .module.active {
            display: block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* =========================================
           MÓDULO 1: FLASHCARDS 3D
        ========================================= */
        .flashcard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 1rem 0;
        }

        .card-container {
            perspective: 1000px;
            height: 250px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container:hover .flashcard:not(.flipped) {
            transform: scale(1.02) rotateX(2deg) rotateY(-2deg);
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: var(--panel-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glow);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card-front h3 {
            font-size: 1.2rem;
            color: var(--cyan-neon);
            margin-bottom: 10px;
            font-family: 'Fira Code', monospace;
        }

        .card-front p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .card-back {
            transform: rotateY(180deg);
            background: rgba(20, 30, 50, 0.8);
            border-color: var(--magenta-neon);
        }

        .card-back p {
            font-size: 1rem;
            line-height: 1.5;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        .eval-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 15px;
        }

        .eval-btn {
            flex: 1;
            padding: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .btn-easy {
            background: rgba(16, 185, 129, 0.2);
            color: var(--green-neon);
            border: 1px solid var(--green-neon);
        }

        .btn-med {
            background: rgba(217, 70, 239, 0.2);
            color: var(--magenta-neon);
            border: 1px solid var(--magenta-neon);
        }

        .btn-hard {
            background: rgba(239, 68, 68, 0.2);
            color: var(--red-neon);
            border: 1px solid var(--red-neon);
        }

        .eval-btn:hover {
            filter: brightness(1.5);
            box-shadow: 0 0 10px currentColor;
        }

        /* =========================================
           MÓDULO 2: QUIZZES ALTO IMPACTO
        ========================================= */
        .quiz-container {
            background: var(--panel-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 3rem;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .quiz-question {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #fff;
            font-family: 'Fira Code', monospace;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .quiz-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .quiz-btn:hover {
            background: rgba(6, 182, 212, 0.15);
            border-color: var(--cyan-neon);
            transform: scale(1.02);
        }

        /* Estados de respuesta */
        .quiz-btn.correct {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--green-neon);
            color: var(--green-neon);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }

        .quiz-btn.wrong {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--red-neon);
            color: var(--red-neon);
            text-decoration: line-through;
        }

        /* Efecto Glitch / Shake */
        .shake-error {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
            box-shadow: inset 0 0 20px rgba(239, 68, 68, 0.5);
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-2px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(4px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-8px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(8px, 0, 0);
            }
        }

        /* Efecto Flash Éxito */
        .flash-success {
            animation: flashSuccess 0.5s ease-out;
        }

        @keyframes flashSuccess {
            0% {
                box-shadow: inset 0 0 0px rgba(16, 185, 129, 0);
            }

            50% {
                box-shadow: inset 0 0 100px rgba(16, 185, 129, 0.8);
            }

            100% {
                box-shadow: inset 0 0 0px rgba(16, 185, 129, 0);
            }
        }

        .quiz-controls {
            margin-top: 2rem;
            display: none;
            /* Oculto hasta responder */
        }

        .btn-next {
            background: var(--cyan-neon);
            color: var(--bg-dark);
            border: none;
            padding: 0.8rem 2rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px var(--cyan-neon);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-next:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--cyan-neon);
        }

        /* =========================================
           MÓDULO 3: DRAG & DROP (SNAP MAGNETICO)
        ========================================= */
        .dnd-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
        }

        .dnd-text-area {
            background: var(--panel-glass);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-glow);
            font-size: 1.1rem;
            line-height: 2;
        }

        .dropzone {
            display: inline-block;
            min-width: 120px;
            height: 35px;
            border-bottom: 2px dashed var(--magenta-neon);
            margin: 0 8px;
            vertical-align: middle;
            background: rgba(217, 70, 239, 0.05);
            transition: all 0.3s;
            text-align: center;
        }

        .dropzone.drag-over {
            background: rgba(217, 70, 239, 0.3);
            border-style: solid;
            box-shadow: 0 0 10px var(--magenta-neon);
            transform: scale(1.05);
        }

        .dropzone.filled {
            border-bottom: 2px solid var(--cyan-neon);
            background: rgba(6, 182, 212, 0.1);
            color: var(--cyan-neon);
            font-weight: bold;
            font-family: 'Fira Code', monospace;
            text-shadow: 0 0 5px var(--cyan-neon);
        }

        .word-bank {
            background: rgba(0, 0, 0, 0.5);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .word-bank h3 {
            color: var(--magenta-neon);
            margin-bottom: 1rem;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .draggable-word {
            background: var(--panel-glass);
            border: 1px solid var(--cyan-neon);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: grab;
            text-align: center;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .draggable-word:active {
            cursor: grabbing;
        }

        .draggable-word:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(6, 182, 212, 0.3);
        }

        .dnd-success {
            margin-top: 1rem;
            color: var(--green-neon);
            font-weight: bold;
            display: none;
            text-align: center;
            animation: fadeInUp 0.5s;
        }

        /* Partículas CSS de Confeti (Generadas dinámicamente) */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: var(--cyan-neon);
            opacity: 0;
        }

        /* =========================================
           NUEVO MÓDULO 4: MATCHING NEURAL (CONECTAR CONCEPTOS)
        ========================================= */
        .match-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .match-column {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .match-item {
            background: var(--panel-glass);
            border: 1px solid var(--border-glow);
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .match-item:hover {
            border-color: var(--cyan-neon);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
            transform: scale(1.02);
        }

        .match-item.selected {
            background: rgba(6, 182, 212, 0.2);
            border-color: var(--cyan-neon);
            box-shadow: 0 0 20px var(--cyan-neon);
            transform: scale(1.05);
        }

        .match-item.matched {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--green-neon);
            color: var(--green-neon);
            pointer-events: none;
            opacity: 0.6;
            box-shadow: none;
            transform: scale(0.98);
        }

        .match-item.error {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
            border-color: var(--red-neon);
            background: rgba(239, 68, 68, 0.2);
        }

        /* ESTILOS EXTRA RESPONSIVOS E INTERACTIVOS */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                padding: 1rem;
            }
            
            nav {
                flex-wrap: wrap;
                gap: 0.5rem;
                padding: 1rem;
            }
            
            .nav-btn {
                flex: 1 1 calc(50% - 1rem);
                font-size: 0.75rem;
                padding: 0.5rem;
                text-align: center;
            }

            main {
                padding: 0 1rem 1rem;
            }

            .dnd-container {
                grid-template-columns: 1fr;
            }

            .match-container {
                grid-template-columns: 1fr;
            }
            
            .quiz-container {
                padding: 1.5rem;
                margin: 0 -0.5rem;
                border-radius: 8px;
            }
            
            .logo-area h1 {
                font-size: 1.8rem;
            }
            
            .card-container {
                height: 220px;
            }
        }
        
        @media (max-width: 480px) {
            .nav-btn {
                flex: 1 1 100%;
            }
        }

        /* MEJORAS DE INTERACTIVIDAD */
        .btn-pomo, .nav-btn, .quiz-btn, .eval-btn, .btn-next, .match-item, .draggable-word {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .quiz-btn:active, .nav-btn:active, .btn-next:active {
            transform: scale(0.95);
        }

        .logo-area h1 {
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 10px var(--cyan-neon), 0 0 20px rgba(6, 182, 212, 0.5); }
            100% { text-shadow: 0 0 15px var(--cyan-neon), 0 0 30px rgba(6, 182, 212, 0.8); }
        }

        .card-container, .quiz-btn, .draggable-word, .match-item {
            opacity: 0;
            animation: fadeInItems 0.5s forwards;
            animation-delay: calc(var(--item-index, 0) * 0.05s);
        }

        @keyframes fadeInItems {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <!-- Canvas para Partículas Neuronales (Fondo) -->
    <canvas id="neuralCanvas"></canvas>

    <!-- Header y Pomodoro -->
    <header>
        <div class="logo-area">
            <h1>SYS<span>.</span>SIM</h1>
        </div>
        <div class="pomodoro-container">
            <button class="btn-pomo" id="pomoBtn" title="Iniciar/Pausar">▶</button>
            <div class="time-display" id="timeDisplay">25:00</div>
            <div class="ring-container">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"></circle>
                    <circle id="pomoRing" cx="20" cy="20" r="16" fill="none" stroke="var(--magenta-neon)"
                        stroke-width="4" stroke-dasharray="100.5" stroke-dashoffset="0"></circle>
                </svg>
            </div>
        </div>
    </header>

    <!-- Navegación -->
    <nav>
        <button class="nav-btn active" data-target="module-flashcards">Core Concepts (3D)</button>
        <button class="nav-btn" data-target="module-quiz">Micro-Evaluación</button>
        <button class="nav-btn" data-target="module-dnd">Drag & Drop (Arquitectura)</button>
        <button class="nav-btn" data-target="module-match">Clasificador Neural</button>
    </nav>

    <!-- Contenedor de Módulos -->
    <main id="app-container">

        <!-- Módulo 1: Flashcards -->
        <section id="module-flashcards" class="module active">
            <div class="flashcard-grid" id="flashcard-container">
                <!-- Inyectado por JS -->
            </div>
        </section>

        <!-- Módulo 2: Quiz -->
        <section id="module-quiz" class="module">
            <div class="quiz-container" id="quiz-ui">
                <h2 class="quiz-question" id="quiz-question">Cargando...</h2>
                <div class="quiz-options" id="quiz-options">
                    <!-- Opciones inyectadas por JS -->
                </div>
                <div class="quiz-controls" id="quiz-controls">
                    <button class="btn-next" id="btn-next-quiz">Siguiente Nodo ➔</button>
                </div>
            </div>
        </section>

        <!-- Módulo 3: Drag & Drop -->
        <section id="module-dnd" class="module">
            <div class="dnd-container">
                <div class="dnd-text-area" id="dnd-text">
                    <!-- Texto inyectado por JS -->
                </div>
                <div class="word-bank">
                    <h3>Banco de Datos</h3>
                    <div id="word-bank-container" style="display:flex; flex-direction:column; gap:10px;">
                        <!-- Palabras inyectadas -->
                    </div>
                </div>
            </div>
            <div class="dnd-success" id="dnd-success-msg">¡Sincronización Neural Completada!</div>
        </section>

        <!-- Módulo 4: Clasificador Neural (Matching) -->
        <section id="module-match" class="module">
            <h2
                style="text-align:center; color:var(--cyan-neon); font-family:'Fira Code', monospace; margin-bottom: 2rem;">
                [ Enlazar Conceptos: Taxonomía de Modelos ]</h2>
            <p style="text-align:center; color:var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">Seleccione un
                término a la izquierda y su definición correspondiente a la derecha.</p>
            <div class="match-container" id="match-ui">
                <div class="match-column" id="match-terms"></div>
                <div class="match-column" id="match-defs"></div>
            </div>
        </section>

    </main>

    <script>
        /* =========================================================================
           BASE DE DATOS NEURONAL (Extraída de "UNIDAD 1.pdf" - Ing. Rodríguez)
           Clasificación: Conceptos Core, Relaciones, Datos de Memorización
        ========================================================================= */
        const DATA = {
            flashcards: [
                { q: "¿Qué es la Simulación de Sistemas?", a: "Técnica numérica que evalúa modelos lógico-matemáticos para imitar el comportamiento dinámico de sistemas complejos bajo parámetros estocásticos.", type: "Core" },
                { q: "¿Paradigma Analítico vs. Simulación?", a: "Analítico: Resuelve matemáticamente para hallar respuesta exacta (baja tolerancia a complejidad). Simulación: Ensaya computacionalmente para inferir comportamiento (alta tolerancia).", type: "Core" },
                { q: "Nombra 3 de los 5 Anti-patrones de Simulación", a: "1. Burn-in inadecuado. 2. KPIs Desalineados. 3. Holgazanería Estadística. 4. Ceguera de Varianza. 5. Mala Abstracción.", type: "Memorización" },
                { q: "Diferencia entre variable Endógena y Exógena", a: "Endógena: Ocurre dentro del sistema (ej. nivel de producción). Exógena: Ocurre en el Medio Ambiente, son inputs paramétricos (ej. ciberataque).", type: "Relación" },
                { q: "¿Qué postula el enfoque numérico (Monte Carlo)?", a: "Abraza la complejidad usando fuerza bruta iterativa y números pseudoaleatorios cuando la resolución analítica colapsa por interacciones no lineales.", type: "Core" },
                { q: "¿Qué es el Estado del Sistema?", a: "Una 'fotografía' en un instante 't' que captura los atributos actuales y variables acumuladas de las entidades.", type: "Memorización" },
                { q: "¿Cuáles son las 3 ventajas estratégicas de la simulación?", a: "1. Seguridad (Sandbox). 2. Time-Scaling (acelerar/ralentizar tiempo). 3. Capacity Planning (dimensionar sistemas inexistentes).", type: "Memorización" },

        function initMatchModule() {

        function handleMatchClick(element) {
            // Early exit si está animando o ya resuelto

            // Deseleccionar si se hace click en el mismo
            if (element.classList.contains('selected')) {

                if (selectedDef) selectedDef.classList.remove('selected');
                selectedDef = element;

        /* =========================================================================
           7. FONDO ANIMADO CYBERPUNK (NODOS CONECTADOS)
        ========================================================================= */
        const canvas = document.getElementById('neuralCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;
        
        let mouse = { x: null, y: null, radius: 150 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            let pCount = Math.floor(width / 15); // Densidad adaptable (aumentada)
            if (width < 768) pCount = Math.floor(width / 10);

            for (let i = 0; i < pCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: (Math.random() - 0.5) * 0.8,
                    baseVx: (Math.random() - 0.5) * 0.8,
                    baseVy: (Math.random() - 0.5) * 0.8
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(6, 182, 212, 0.8)';
            ctx.lineWidth = 0.5;

            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                
                // Efecto de repulsión con el mouse magnético
                if (mouse.x != null) {
                    let dx = mouse.x - p.x;
                    let dy = mouse.y - p.y;
                    let distance = Math.hypot(dx, dy);
                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        const fx = (dx / distance) * force * 2;
                        const fy = (dy / distance) * force * 2;
                        p.vx -= fx;
                        p.vy -= fy;
                    }
                }

                // Fricción constante para recuperar velocidad inicial
                p.vx = p.vx * 0.95 + p.baseVx * 0.05;
                p.vy = p.vy * 0.95 + p.baseVy * 0.05;

                p.x += p.vx;
                p.y += p.vy;

                // Rebote bordes
                if (p.x < 0) { p.x = 0; p.vx *= -1; p.baseVx *= -1; }
                if (p.x > width) { p.x = width; p.vx *= -1; p.baseVx *= -1; }
                if (p.y < 0) { p.y = 0; p.vy *= -1; p.baseVy *= -1; }
                if (p.y > height) { p.y = height; p.vy *= -1; p.baseVy *= -1; }

                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();

                // Conectar nodos cercanos
                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);

                    if (dist < 120) {
                        ctx.strokeStyle = `rgba(6, 182, 212, ${1 - dist / 120})`;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
                
                // Conectar al mouse (red neural)
                if (mouse.x != null) {
                    let mouseDist = Math.hypot(mouse.x - p.x, mouse.y - p.y);
                    if (mouseDist < 150) {
                        ctx.strokeStyle = `rgba(217, 70, 239, ${1 - mouseDist / 150})`; // Magenta
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.stroke();
                        ctx.lineWidth = 0.5; // Reset
                    }
                }
            }
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        drawParticles();

    </script>
</body>

</html>
